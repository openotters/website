replicaCount: 1

image:
  repository: ghcr.io/openotters/website
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Optional GitHub token for runtime ISR refreshes (the /agents, /binaries and
# /agentspec pages re-fetch from GitHub every hour). Without a token, those
# pages keep serving the content baked in at build time.
#
# Provision the secret with:
#   kubectl create secret generic openotters-website-gh \
#     --from-literal=GITHUB_TOKEN=ghp_xxx
github:
  enabled: false
  secretName: "openotters-website-gh"
  secretKey: "GITHUB_TOKEN"

# Extra environment variables (key/value pairs) injected into the container.
extraEnv: {}

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: openotters.io
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # tls:
  #   - secretName: openotters-tls
  #     hosts:
  #       - openotters.io

resources: {}
  # limits:
  #   cpu: 500m
  #   memory: 512Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

volumes: []
volumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}
